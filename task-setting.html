<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>StepLink</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="icon" href="/icon.ico" type="image/x-icon" />
</head>
<body data-page="task-setting">
  <div class="app">
    <aside class="sidebar-left">
      <div class="logo">StepLink</div>
      <nav class="nav">
        <a href="index.html" class="nav-item">ホーム</a>
        <a href="messages.html" class="nav-item">メッセージ</a>
        <a href="notifications.html" class="nav-item notif-nav">
          <span class="notif-wrap">🔔<span class="notif-dot" data-notif-dot></span></span>
          通知
        </a>
        <a href="profile.html" class="nav-item">プロフィール</a>
        <a href="AI.html" class="nav-item">AI</a>
        <a href="task-setting.html" class="nav-item active">タスク</a>
      </nav>

      <button class="post-button" type="button" onclick="document.getElementById('taskPlanTitle')?.focus()">実行案を作る</button>

      <div class="account-summary">
        <div class="account-main">
          <div class="account-avatar" id="currentUserAvatar">🧑‍💻</div>
          <div>
            <div class="account-name" id="currentUserName">未ログイン</div>
            <div class="account-handle" id="currentUserHandle"></div>
          </div>
        </div>
        <button class="icon-btn small" id="switchAccountBtn">アカウント</button>
        <button class="logout-button" id="logoutBtn">ログアウト</button>
      </div>
    </aside>

    <main class="timeline task-page-main">
      <header class="timeline-header">
        <div>
          <h1>タスク設定</h1>
          <div class="task-page-sub">実行案を自分で入力して、そのままタスク保存までできるページ</div>
        </div>
      </header>

      <section class="task-layout">
        <div class="task-column">
          <h2>実行案を追加</h2>
          <form id="taskPlanForm" class="task-form-grid">
            <label>カテゴリ<input id="taskPlanCategory" type="text" maxlength="40" placeholder="例：学習計画" required /></label>
            <label>タイトル<input id="taskPlanTitle" type="text" maxlength="100" placeholder="例：毎日英語15分" required /></label>
            <label>一覧用の短い説明<textarea id="taskPlanExcerpt" maxlength="180" placeholder="一覧で最初に見える説明" required></textarea></label>
            <label>詳細説明<textarea id="taskPlanDetail" maxlength="1200" placeholder="選択後に表示する詳しい説明" required></textarea></label>
            <label>サムネ画像URL<input id="taskPlanThumbnail" type="url" placeholder="https://..." /></label>
            <label>やること 1<input id="taskPlanPoint1" type="text" maxlength="100" placeholder="例：単語帳を10個進める" /></label>
            <label>やること 2<input id="taskPlanPoint2" type="text" maxlength="100" placeholder="例：英文を1つ音読する" /></label>
            <label>やること 3<input id="taskPlanPoint3" type="text" maxlength="100" placeholder="例：学習記録をつける" /></label>
            <button class="post-button" type="submit">実行案を保存</button>
            <div id="taskPlanStatus" class="task-form-status"></div>
          </form>

          <div class="task-search-row">
            <input id="taskPlanSearch" class="task-search-input" type="text" placeholder="実行案を検索" />
          </div>
          <div id="taskPlanList" class="task-plan-list"></div>
        </div>

        <aside id="taskDetailPanel" class="task-detail-panel">
          <div class="empty-state"><p>実行案を選ぶと詳細が表示されるよ。</p></div>
        </aside>
      </section>

      <section class="task-saved-section">
        <div class="task-section-head">
          <h2>保存済みタスク</h2>
          <button id="taskReloadBtn" type="button" class="icon-btn">再読み込み</button>
        </div>
        <div id="userTasksList" class="task-saved-list"></div>
      </section>
    </main>
  </div>

  <div id="accountModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <header class="modal-header">
        <button id="closeAccountModalBtn" class="icon-btn">✕</button>
      </header>

      <div class="modal-body account-modal-body">
        <div class="account-tabs">
          <button class="account-tab active" data-mode="login">ログイン</button>
          <button class="account-tab" data-mode="register">新規登録</button>
        </div>

        <div id="accountLoginView">
          <label>メール<input id="loginHandleInput" type="email" /></label>
          <label>パスワード<input id="loginPasswordInput" type="password" /></label>
          <button class="primary" id="loginSubmitBtn">ログイン</button>
          <div id="loginError" class="account-error"></div>
        </div>

        <div id="accountRegisterView" class="hidden">
          <label>名前<input id="regNameInput" type="text" /></label>
          <label>ハンドル<input id="regHandleInput" type="text" /></label>
          <label>メール<input id="regEmailInput" type="email" /></label>
          <label>アイコン絵文字<input id="regAvatarInput" type="text" placeholder="🧑‍💻" /></label>
          <label>パスワード<input id="regPasswordInput" type="password" /></label>
          <button class="primary" id="registerSubmitBtn">登録</button>
          <div id="registerError" class="account-error"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
