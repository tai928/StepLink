 <!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>StepLink Chatbot</title>
  <link rel="stylesheet" href="https://tai928.github.io/StepLink/style.css">

  <style>
    .timeline { padding-bottom: 16px; }
    .toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .toolbar select{
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }
    .toolbar .icon-btn { height: 36px; }
    .dm-messages { background: #f7f7f7; } 
    .dm-thread { height: calc(100vh - 56px); }
    @media (max-width: 900px){
      .dm-thread { height: calc(100vh - 56px - 56px); } 
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- 左サイドバー（StepLinkと同じ見た目） -->
    <aside class="sidebar-left">
      <div class="logo">StepLink</div>

    <nav class="nav">
      <a href="index.html" class="nav-item">ホーム</a>
      <a href="task-setting.html" class="nav-item">タスク</a>
      <a href="messages.html" class="nav-item">メッセージ</a>
      <a href="notifications.html" class="nav-item notif-nav">
        <span class="notif-wrap">
          🔔
          <span class="notif-dot" data-notif-dot></span>
        </span>
        通知
      </a>
      <a href="profile.html" class="nav-item">プロフィール</a>
      <a href="AI.html" class="nav-item">AI</a>
    </nav>
     
      <button class="post-button" id="newThread">新しい会話</button>

      <div class="account-summary">
        <div class="account-main">
          <div class="account-avatar">🤖</div>
          <div>
            <div class="account-name">AI</div>
            <div class="account-handle">@AI</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- メイン -->
    <main class="timeline">
      <div class="timeline-header">
        <div class="toolbar">
          <strong>AI Chat</strong>

          <select id="mbti"></select>

          <select id="verbosity">
            <option value="short">短め</option>
            <option value="normal" selected>普通</option>
            <option value="long">詳しめ</option>
          </select>

          <select id="mode">
            <option value="consult" selected>相談</option>
            <option value="chat">雑談</option>
          </select>

          <button class="icon-btn" id="clear">履歴クリア</button>
        </div>
      </div>

      <!-- DMのレイアウトを流用 -->
      <section class="dm-thread">
        <div id="chat" class="dm-messages"></div>

        <div class="dm-input-area">
          <textarea id="msg" placeholder="メッセージを入力…"></textarea>
          <button id="send" class="dm-send-btn">送信</button>
        </div>
      </section>

    </main>
  </div>

<script type="module">
  import { MBTI_LIST, MBTI_POLICIES } from "./mbti_policies.js";
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const SUPABASE_URL = "https://ngtthuwmqdcxgddlbsyo.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_YJzguO8nmmVKURa58cKwVw__9ulKxI6";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const chat = document.getElementById("chat");
  const msg = document.getElementById("msg");
  const sendBtn = document.getElementById("send");
  const newThreadBtn = document.getElementById("newThread");
  const clearBtn = document.getElementById("clear");

  const mbtiSel = document.getElementById("mbti");
  const verbSel = document.getElementById("verbosity");
  const modeSel = document.getElementById("mode");

  const saved = JSON.parse(localStorage.getItem("mbtiSettings") || "{}");

  const state = {
    mbti: saved.mbti || "INTJ",
    verbosity: saved.verbosity || "normal",
    mode: saved.mode || "consult",
    history: [],
    threadId: null
  };

  // MBTI選択肢
  MBTI_LIST.forEach(t => {
    const o = document.createElement("option");
    o.value = t;
    o.textContent = t;
    mbtiSel.appendChild(o);
  });

  // 初期値反映
  mbtiSel.value = state.mbti;
  verbSel.value = state.verbosity;
  modeSel.value = state.mode;

  function saveSettings() {
    localStorage.setItem("mbtiSettings", JSON.stringify({
      mbti: state.mbti,
      verbosity: state.verbosity,
      mode: state.mode
    }));
  }

  // ★ StepLinkのDMスタイルに合わせたメッセージDOM
  function addMessage(text, who) {
    const d = document.createElement("div");
    d.className = `dm-message ${who === "me" ? "me" : "other"}`;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
  }

  function resetConversation(note) {
    state.history = [];
    state.threadId = null;
    if (note) addMessage(note, "other");
  }

  mbtiSel.onchange = () => {
    state.mbti = mbtiSel.value;
    saveSettings();
    resetConversation(`（MBTI: ${state.mbti} に変更）`);
  };

  verbSel.onchange = () => {
    state.verbosity = verbSel.value;
    saveSettings();
    resetConversation(`（文章量: ${state.verbosity} に変更）`);
  };

  modeSel.onchange = () => {
    state.mode = modeSel.value;
    saveSettings();
    resetConversation(`（モード: ${state.mode === "consult" ? "相談" : "雑談"} に変更）`);
  };

  newThreadBtn.onclick = () => resetConversation("（新しい会話を開始しました）");
  clearBtn.onclick = () => { chat.innerHTML = ""; resetConversation("（表示をクリアしました）"); };

  function systemPrompt() {
    const len =
      state.verbosity === "short" ? "短く要点のみ。結論→理由の2段で。" :
      state.verbosity === "long"  ? "詳しく。結論→理由→手順（必要なら例）で。" :
      "読みやすい標準的な長さ。結論→理由→必要なら手順。";

    const modeRule =
      state.mode === "consult"
        ? "相談モード：状況整理→確認質問（最大3つ）→提案（最大3つ）。相手を診断・断定しない。"
        : "雑談モード：テンポ良く会話する。ただし幼児語・過剰な感嘆符は禁止。必要なら質問で広げる。";

    return `
あなたはStepLink内のチャットボット。
高校生以上向けの文体。幼児語・擬音・過剰な感嘆符は禁止。
人を診断・断定しない。安全に配慮する。

返答ルール：${len}
モード：${modeRule}

【MBTIポリシー（必ず遵守）】
${MBTI_POLICIES[state.mbti]}
`.trim();
  }

  async function requireUser() {
    const { data, error } = await supabase.auth.getUser();
    if (error || !data?.user) throw new Error("ログインが必要です");
    return data.user;
  }

  async function ensureThread() {
    if (state.threadId) return state.threadId;

    const user = await requireUser();

    const { data: thread, error } = await supabase
      .from("ai_threads")
      .insert({
        user_id: user.id,
        title: "AI chat",
        mode: state.mode,
        mbti: state.mbti
      })
      .select()
      .single();

    if (error) throw error;

    state.threadId = thread.id;
    return state.threadId;
  }

  async function saveMessage(role, content) {
    const user = await requireUser();
    const threadId = await ensureThread();

    const { error } = await supabase
      .from("ai_messages")
      .insert({
        thread_id: threadId,
        user_id: user.id,
        role,
        content
      });

    if (error) throw error;
  }

  async function send() {
    const text = msg.value.trim();
    if (!text) return;

    msg.value = "";
    msg.focus();

    addMessage(text, "me");
    state.history.push({ role: "user", content: text });

    // userログ保存
    try { await saveMessage("user", text); }
    catch (e) { addMessage(`（ログ保存失敗：${e.message}）`, "other"); }

    // thinking
    addMessage("…考え中", "other");
    const loading = chat.lastChild;

    try {
      const res = await fetch("https://ai.taisei-study928.workers.dev/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system: systemPrompt(),
          messages: state.history.slice(-12)
        })
      });

      const data = await res.json();
      const reply = data.reply ?? "(返答が空でした)";

      loading.textContent = reply;
      state.history.push({ role: "assistant", content: reply });

      // assistantログ保存
      try { await saveMessage("assistant", reply); }
      catch (e) { addMessage(`（ログ保存失敗：${e.message}）`, "other"); }

    } catch (e) {
      loading.textContent = "エラー：" + e.message;
    }
  }

  sendBtn.onclick = send;

  addMessage("ログイン後、使用可能", "other");
</script>

</body>
</html>
